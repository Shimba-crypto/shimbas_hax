name: Installation Test

on:
  push:
  pull_request:

jobs:
  verify-install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Install wheel
        run: |
          pip install dist/*.whl

      - name: Verify imports
        run: |
          python -c "import shimbas_hax; print('Import successful')"

      - name: Verify CLI
        run: |
          shimbas-hax --help
